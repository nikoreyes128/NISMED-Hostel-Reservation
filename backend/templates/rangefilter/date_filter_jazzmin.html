{% load i18n rangefilter_compat %}
<h3>{% blocktrans with filter_title=title %} By {{ filter_title }} {% endtrans %}</h3>
<style>
  .admindatefilter .button, .admindatefilter input[type=submit], .admindatefilter input[type=button], .admindatefilter .submit-row input, .admindatefilter a.button {
    background: #17a2b8;
    padding: 4px 10px;
    margin: 0;
    color: #fff;
  }
</style>
<div class="admindatefilter">
    <!-- Removed <form> wrapper that was hijacking the Jazzmin search -->
    {% for choice in choices %}
        <input type="hidden" id="{{ choice.system_name }}-query-string" value="{{ choice.query_string }}">
    {% endfor %}
    <div class="form-group">
        <input type="text" class="form-control"
               placeholder="{{ field_name|title }} {% trans 'from' %}"
               id="{{ expected_data_field_gte }}"
               name="{{ expected_data_field_gte }}"
               value="{{ expected_data_field_gte_val }}"
               data-date-format="{{ get_date_format|default:'yyyy-mm-dd' }}">
    </div>
    <div class="form-group">
        <input type="text" class="form-control"
               placeholder="{{ field_name|title }} {% trans 'to' %}"
               id="{{ expected_data_field_lte }}"
               name="{{ expected_data_field_lte }}"
               value="{{ expected_data_field_lte_val }}"
               data-date-format="{{ get_date_format|default:'yyyy-mm-dd' }}">
    </div>
    <!-- Removed nested search/reset buttons. Jazzmin's primary blue search button will submit these fields natively. -->
</div>
